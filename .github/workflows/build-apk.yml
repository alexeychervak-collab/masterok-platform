name: Build STROYKA APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get
      
      - name: Build APK (Debug)
        run: |
          cd mobile
          flutter build apk --debug
      
      - name: Build APK (Release - Split)
        run: |
          cd mobile
          flutter build apk --release --split-per-abi
      
      - name: Build App Bundle (AAB)
        run: |
          cd mobile
          flutter build appbundle --release
      
      - name: Upload APK (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          
      - name: Upload APK (armeabi)
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release
          path: mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: mobile/build/app/outputs/bundle/release/app-release.aab
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

