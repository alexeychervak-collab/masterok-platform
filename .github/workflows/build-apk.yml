name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.7'
        channel: 'stable'
    
    - name: Get dependencies
      run: |
        cd mobile
        flutter pub get
    
    - name: Build APK (split by ABI)
      run: |
        cd mobile
        flutter build apk --release --split-per-abi
    
    - name: Upload APK (ARM64) - For most modern phones
      uses: actions/upload-artifact@v3
      with:
        name: MasterOK-arm64-v8a
        path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    
    - name: Upload APK (ARM32) - For older phones
      uses: actions/upload-artifact@v3
      with:
        name: MasterOK-armeabi-v7a
        path: mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    
    - name: Upload APK (x86_64) - For emulators
      uses: actions/upload-artifact@v3
      with:
        name: MasterOK-x86_64
        path: mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
