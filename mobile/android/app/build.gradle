plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.masterok.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    def keystoreProperties = new Properties()
    def keystorePropertiesFile = rootProject.file('key.properties')
    if (keystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
            // Максимальная совместимость установки (Android 5/6 требуют v1)
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.masterok.app"
        // Минимальная версия Android 5.0 (поддержка ВСЕХ Samsung устройств)
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        // Версия берётся из pubspec.yaml (Flutter проставляет flutter.versionCode/flutter.versionName в local.properties)
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // Поддержка многоязычности
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Отключаем минификацию для совместимости с Samsung
            minifyEnabled false
            shrinkResources false
            
            // Release подпись (keystore)
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
    
    // MultiDex для поддержки большого количества методов
    implementation 'androidx.multidex:multidex:2.0.1'
}
