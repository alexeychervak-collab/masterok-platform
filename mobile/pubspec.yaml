name: masterok
description: МастерОК — Платформа строительных услуг №1 в России
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  
  # State Management
  flutter_riverpod: ^2.4.9
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.1.0
  
  # Network
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Utils
  intl: any
  uuid: ^4.5.1
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
